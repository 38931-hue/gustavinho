<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Matriculado</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f1f1f1;
      font-family: Arial;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    h1 {
      color: green;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Matriculado com sucesso ✅</h1>
    <p>Palmeiras não tem mundial 😅</p>
  </div>

</body>
</html>
